<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AstraHub | Duels & MM2</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #05010a;
            --accent: #aa00ff;
            --accent-glow: rgba(170, 0, 255, 0.8);
            --text-main: #ffffff;
            --text-muted: #bda6d1;
            --box-bg: rgba(20, 5, 35, 0.7);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Montserrat', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* FONDO ANIMADO DE ESTRELLAS */
        #space-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            background: radial-gradient(circle at center, #130524 0%, var(--bg-dark) 100%);
            overflow: hidden;
            pointer-events: none;
        }

        .star {
            position: absolute;
            background-color: white;
            border-radius: 50%;
            animation: twinkle infinite alternate;
        }

        .shooting-star {
            position: absolute;
            width: 80px;
            height: 2px;
            background: linear-gradient(90deg, rgba(255,255,255,1) 0%, rgba(170,0,255,0) 100%);
            transform: rotate(-45deg);
            animation: shoot linear forwards;
            opacity: 0;
        }

        @keyframes twinkle {
            0% { opacity: 0.2; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1.2); box-shadow: 0 0 5px white; }
        }

        @keyframes shoot {
            0% { transform: translate(0, 0) rotate(-45deg); opacity: 1; }
            100% { transform: translate(-1000px, 1000px) rotate(-45deg); opacity: 0; }
        }

        /* EFECTO DE LEVITACIÓN */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }

        /* CONTENEDOR PRINCIPAL SIN CUADRO, SOLO FLOTANDO */
        .main-panel {
            position: relative;
            z-index: 10;
            padding: 40px 20px;
            width: 90%;
            max-width: 500px;
            text-align: center;
            animation: float 5s ease-in-out infinite; /* Aquí está el efecto de levitación */
        }

        .logo {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--accent);
            box-shadow: 0 0 30px 10px var(--accent-glow);
            margin-bottom: 25px;
            animation: pulseGlow 3s infinite alternate;
        }

        @keyframes pulseGlow {
            0% { box-shadow: 0 0 20px 5px var(--accent-glow); }
            100% { box-shadow: 0 0 40px 15px var(--accent-glow); }
        }

        /* NUEVA FUENTE PERRA PARA EL TÍTULO */
        h1 {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 2.2em;
            letter-spacing: 2px;
            margin-bottom: 30px;
            text-shadow: 0 0 15px var(--accent);
            text-transform: uppercase;
        }

        .section-label {
            color: var(--text-muted);
            font-weight: 700;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
            text-align: left;
            margin-left: 5px;
        }

        .script-box {
            background-color: var(--box-bg);
            border: 1px solid var(--accent);
            border-radius: 12px;
            padding: 18px;
            margin-bottom: 35px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            box-shadow: 0 0 20px rgba(170, 0, 255, 0.2), inset 0 0 10px rgba(0,0,0,0.5);
        }

        code {
            color: #00ff88;
            font-family: monospace;
            font-size: 1em;
            word-break: break-all;
            text-align: left;
        }

        .btn {
            background-color: var(--accent);
            color: var(--text-main);
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            font-size: 1.05em;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
        }

        .btn:hover {
            background-color: #c433ff;
            box-shadow: 0 0 20px var(--accent);
            transform: scale(1.02);
        }

        .btn:active {
            transform: scale(0.98);
        }

        /* BOTÓN DEL EXECUTOR CENTRADO Y COMO LINK */
        .executor-container {
            display: flex;
            justify-content: center; /* Centra el botón */
            margin-bottom: 40px;
        }

        .executor-btn {
            background-color: var(--box-bg);
            border: 2px dashed var(--accent);
            color: var(--text-main);
            padding: 15px 40px;
            border-radius: 12px;
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            font-size: 1.1em;
            text-decoration: none; /* Quita la raya de abajo del link */
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            box-shadow: 0 0 15px rgba(170, 0, 255, 0.1);
        }

        .executor-btn:hover {
            background-color: rgba(170, 0, 255, 0.2);
            border-style: solid;
            box-shadow: 0 0 25px rgba(170, 0, 255, 0.4);
            transform: scale(1.05);
        }

        .click-hint {
            font-size: 0.75em;
            color: var(--text-muted);
            font-weight: 400;
        }

        .developers {
            font-size: 0.9em;
            color: var(--text-muted);
            padding-top: 15px;
            margin-top: 10px;
        }

        .dev-names {
            color: var(--accent);
            font-weight: 900;
            text-shadow: 0 0 5px rgba(170, 0, 255, 0.5);
        }
    </style>
</head>
<body>

    <div id="space-container"></div>

    <div class="main-panel">
        <img src="https://github.com/AnyDevPA.png" alt="Logo AstraHub" class="logo">
        
        <h1>AstraHub Duels & MM2</h1>

        <div class="section-label">Script:</div>
        <div class="script-box">
            <code id="scriptCode">loadstring(game:HttpGet("http://74.208.118.5/astrahub"))()</code>
            <button class="btn" id="copyScriptBtn" onclick="copiarTexto('scriptCode', this, '📋 Copiar Script')">📋 Copiar Script</button>
        </div>

        <div class="section-label" style="text-align: center; margin-bottom: 15px;">Executor recomendado:</div>
        
        <div class="executor-container">
            <a href="https://delta.filenetwork.vip/android.html#" target="_blank" class="executor-btn">
                Delta Executor
                <span class="click-hint">(Clic para descargar)</span>
            </a>
        </div>

        <div class="developers">
            Developers: <span class="dev-names">Astra & Nath</span>
        </div>
    </div>

    <script>
        function copiarTexto(elementoId, boton, textoOriginal) {
            var codigo = document.getElementById(elementoId).innerText;
            navigator.clipboard.writeText(codigo).then(function() {
                boton.innerText = "✅ ¡Copiado!";
                boton.style.backgroundColor = "#00ff88";
                boton.style.color = "#000";
                
                setTimeout(function() {
                    boton.innerText = textoOriginal;
                    boton.style.backgroundColor = "var(--accent)";
                    boton.style.color = "var(--text-main)";
                }, 2000);
            });
        }

        const space = document.getElementById('space-container');
        
        for (let i = 0; i < 150; i++) {
            let star = document.createElement('div');
            star.className = 'star';
            
            let size = Math.random() * 2 + 1;
            star.style.width = size + 'px';
            star.style.height = size + 'px';
            
            star.style.left = Math.random() * 100 + 'vw';
            star.style.top = Math.random() * 100 + 'vh';
            
            star.style.animationDuration = (Math.random() * 3 + 1) + 's';
            star.style.animationDelay = (Math.random() * 5) + 's';
            
            space.appendChild(star);
        }

        function spawnShootingStar() {
            let sStar = document.createElement('div');
            sStar.className = 'shooting-star';
            
            sStar.style.left = (Math.random() * 150) + 'vw';
            sStar.style.top = '-50px';
            
            sStar.style.animationDuration = (Math.random() * 1.5 + 0.5) + 's';
            
            space.appendChild(sStar);
            
            setTimeout(() => {
                sStar.remove();
            }, 2000);
        }

        setInterval(() => {
            spawnShootingStar();
        }, Math.random() * 4000 + 2000);
        
        setTimeout(spawnShootingStar, 1000);
    </script>
</body>
</html>
