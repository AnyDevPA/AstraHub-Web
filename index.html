<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AstraHub | Duels & MM2</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #05010a;
            --accent: #aa00ff;
            --accent-glow: rgba(170, 0, 255, 0.8);
            --text-main: #ffffff;
            --text-muted: #bda6d1;
            --box-bg: rgba(20, 5, 35, 0.4);
            --text-script: #00f2fe; /* Cyan Neón súper brillante para el script */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Montserrat', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* FONDO ANIMADO DE ESTRELLAS */
        #space-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            background: radial-gradient(circle at center, #130524 0%, var(--bg-dark) 100%);
            overflow: hidden;
            pointer-events: none;
        }

        .star {
            position: absolute;
            background-color: white;
            border-radius: 50%;
            animation: twinkle infinite alternate;
        }

        .shooting-star {
            position: absolute;
            width: 80px;
            height: 2px;
            background: linear-gradient(90deg, rgba(255,255,255,1) 0%, rgba(170,0,255,0) 100%);
            transform: rotate(-45deg);
            animation: shoot linear forwards;
            opacity: 0;
        }

        @keyframes twinkle {
            0% { opacity: 0.2; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1.2); box-shadow: 0 0 5px white; }
        }

        @keyframes shoot {
            0% { transform: translate(0, 0) rotate(-45deg); opacity: 1; }
            100% { transform: translate(-1000px, 1000px) rotate(-45deg); opacity: 0; }
        }

        /* EFECTO DE LEVITACIÓN */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-12px); }
            100% { transform: translateY(0px); }
        }

        .main-panel {
            position: relative;
            z-index: 10;
            padding: 40px 20px;
            width: 90%;
            max-width: 500px;
            text-align: center;
            animation: float 6s ease-in-out infinite;
        }

        /* CONTENEDOR DE AVATARES DUALES */
        .avatar-container {
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            margin-bottom: 25px;
            box-shadow: 0 0 30px 10px var(--accent-glow);
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
            border-radius: 60px;
            animation: pulseGlow 3s infinite alternate;
        }

        @keyframes pulseGlow {
            0% { box-shadow: 0 0 20px 5px var(--accent-glow); }
            100% { box-shadow: 0 0 40px 15px var(--accent-glow); }
        }

        /* LA CLASE LOGO AHORA APLICA PERFECTO A VIDEOS Y FOTOS */
        .logo {
            width: 110px; 
            height: 110px;
            border-radius: 50%;
            object-fit: cover; /* Esto hace que el video no se deforme y rellene el círculo */
            border: 3px solid var(--accent);
            position: relative;
            background-color: #000; /* Fondo negro por si el video tarda en cargar */
        }

        .logo:first-child {
            margin-right: -15px; 
            z-index: 2; 
        }

        .logo:last-child {
            z-index: 1;
        }

        /* TÍTULO FUTURISTA */
        h1 {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 2.2em;
            letter-spacing: 2px;
            margin-bottom: 30px;
            text-shadow: 0 0 20px var(--accent);
            text-transform: uppercase;
        }

        .section-label {
            color: var(--text-muted);
            font-weight: 700;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
            text-align: left;
            margin-left: 5px;
        }

        /* CAJAS CON EFECTO CRISTAL */
        .glass-box {
            background-color: var(--box-bg);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(170, 0, 255, 0.4);
            border-radius: 12px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        .script-box {
            padding: 18px;
            margin-bottom: 30px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        code {
            color: var(--text-script); 
            font-family: monospace;
            font-size: 1em;
            word-break: break-all;
            text-align: left;
            text-shadow: 0 0 5px rgba(0, 242, 254, 0.5); 
        }

        /* BOTONES */
        .btn {
            background-color: var(--accent);
            color: var(--text-main);
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            font-size: 1.05em;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
            animation: heartbeat 2.5s infinite;
        }

        @keyframes heartbeat {
            0% { transform: scale(1); box-shadow: 0 0 10px var(--accent-glow); }
            5% { transform: scale(1.02); box-shadow: 0 0 20px var(--accent-glow); }
            10% { transform: scale(1); box-shadow: 0 0 10px var(--accent-glow); }
            100% { transform: scale(1); box-shadow: 0 0 10px var(--accent-glow); }
        }

        .btn:hover {
            background-color: #c433ff;
            box-shadow: 0 0 25px var(--accent);
            animation: none; 
            transform: scale(1.02);
        }

        .btn:active {
            transform: scale(0.98);
        }

        /* BOTÓN DEL EXECUTOR */
        .executor-container {
            display: flex;
            justify-content: center;
            margin-bottom: 35px;
        }

        .executor-btn {
            padding: 15px 40px;
            border-radius: 12px;
            border: 2px dashed rgba(170, 0, 255, 0.6);
            color: var(--text-main);
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            font-size: 1.1em;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .executor-btn:hover {
            background-color: rgba(170, 0, 255, 0.2);
            border-style: solid;
            border-color: var(--accent);
            box-shadow: 0 0 20px rgba(170, 0, 255, 0.3);
            transform: scale(1.05);
        }

        .click-hint {
            font-size: 0.75em;
            color: var(--text-muted);
            font-weight: 400;
        }

        /* REDES SOCIALES */
        .social-container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 25px;
        }

        .social-btn {
            background: rgba(20, 5, 35, 0.5);
            border: 1px solid rgba(170, 0, 255, 0.5);
            color: var(--text-main);
            padding: 10px 18px;
            border-radius: 30px; 
            text-decoration: none;
            font-weight: 700;
            font-size: 0.9em;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
        }

        .social-btn:hover {
            background: var(--accent);
            box-shadow: 0 0 15px var(--accent-glow);
            transform: translateY(-3px);
            border-color: var(--accent);
        }

        .social-disabled {
            opacity: 0.5;
            cursor: not-allowed;
            border-color: #555;
        }

        .social-disabled:hover {
            background: rgba(20, 5, 35, 0.5);
            box-shadow: none;
            transform: none;
            border-color: #555;
        }

        .developers {
            font-size: 0.9em;
            color: var(--text-muted);
            padding-top: 15px;
            margin-top: 10px;
            border-top: 1px dashed rgba(170, 0, 255, 0.3);
        }

        .dev-names {
            color: var(--accent);
            font-weight: 900;
            text-shadow: 0 0 5px rgba(170, 0, 255, 0.5);
        }
    </style>
</head>
<body>

    <div id="space-container"></div>

    <div class="main-panel">
        <div class="avatar-container">
            <video src="TU_VIDEO_AQUI.mp4" class="logo" autoplay loop muted playsinline></video>
            
            <video src="EL_VIDEO_DE_NATH_AQUI.mp4" class="logo" autoplay loop muted playsinline></video>
        </div>
        
        <h1>AstraHub Duels & MM2</h1>

        <div class="section-label">Script:</div>
        <div class="script-box glass-box">
            <code id="scriptCode">loadstring(game:HttpGet("http://74.208.118.5/astrahub"))()</code>
            <button class="btn" id="copyScriptBtn" onclick="copiarTexto('scriptCode', this, '📋 Copiar Script')">📋 Copiar Script</button>
        </div>

        <div class="section-label" style="text-align: center; margin-bottom: 15px;">Executor recomendado:</div>
        <div class="executor-container">
            <a href="https://delta.filenetwork.vip/android.html#" target="_blank" class="executor-btn glass-box">
                Delta Executor
                <span class="click-hint">(Clic para descargar)</span>
            </a>
        </div>

        <div class="section-label" style="text-align: center; margin-bottom: 15px;">Comunidad Oficial:</div>
        <div class="social-container">
            <a href="https://t.me/astraacommunity" target="_blank" class="social-btn">✈️ Telegram</a>
            <a href="https://www.tiktok.com/@dxzydev" target="_blank" class="social-btn">🎵 TikTok</a>
            <a href="#" class="social-btn social-disabled" onclick="return false;" title="Próximamente...">👾 Discord</a>
        </div>

        <div class="developers">
            Developers: <span class="dev-names">Astra & Nath</span>
        </div>
    </div>

    <script>
        function copiarTexto(elementoId, boton, textoOriginal) {
            var codigo = document.getElementById(elementoId).innerText;
            navigator.clipboard.writeText(codigo).then(function() {
                boton.innerText = "✅ ¡Copiado!";
                boton.style.backgroundColor = "#00ff88";
                boton.style.color = "#000";
                boton.style.animation = "none";
                
                setTimeout(function() {
                    boton.innerText = textoOriginal;
                    boton.style.backgroundColor = "var(--accent)";
                    boton.style.color = "var(--text-main)";
                    boton.style.animation = "heartbeat 2.5s infinite";
                }, 2000);
            });
        }

        const space = document.getElementById('space-container');
        
        for (let i = 0; i < 150; i++) {
            let star = document.createElement('div');
            star.className = 'star';
            
            let size = Math.random() * 2 + 1;
            star.style.width = size + 'px';
            star.style.height = size + 'px';
            
            star.style.left = Math.random() * 100 + 'vw';
            star.style.top = Math.random() * 100 + 'vh';
            
            star.style.animationDuration = (Math.random() * 3 + 1) + 's';
            star.style.animationDelay = (Math.random() * 5) + 's';
            
            space.appendChild(star);
        }

        function spawnShootingStar() {
            let sStar = document.createElement('div');
            sStar.className = 'shooting-star';
            
            sStar.style.left = (Math.random() * 150) + 'vw';
            sStar.style.top = '-50px';
            
            sStar.style.animationDuration = (Math.random() * 1.5 + 0.5) + 's';
            
            space.appendChild(sStar);
            
            setTimeout(() => {
                sStar.remove();
            }, 2000);
        }

        setInterval(() => {
            spawnShootingStar();
        }, Math.random() * 4000 + 2000);
        
        setTimeout(spawnShootingStar, 1000);
    </script>
</body>
</html>
