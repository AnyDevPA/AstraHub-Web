<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AstraHub - Error de Conexión</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: black;
            overflow: hidden; /* Para que no pueda scrollear */
        }
        #video-susto {
            width: 100vw;
            height: 100vh;
            object-fit: cover; /* Hace que el video llene toda la pantalla sin bordes negros */
            pointer-events: none; /* Evita que le salgan los controles de pausa al tocar el video */
        }
    </style>
</head>
<body id="trampa">

    <video id="video-susto" src="susto.mp4" autoplay muted loop playsinline></video>

    <script>
        let video = document.getElementById('video-susto');
        let trampa = document.getElementById('trampa');

        // Si la rata toca CUALQUIER parte de la pantalla (un tap en el cel o un clic en PC)
        trampa.addEventListener('click', function() {
            // Le quitamos el silencio
            video.muted = false;
            // Le forzamos el volumen de la web al 100%
            video.volume = 1.0;
        });

        // Esto es lo mismo pero para pantallas táctiles (por si el 'click' falla en algunos celulares)
        trampa.addEventListener('touchstart', function() {
            video.muted = false;
            video.volume = 1.0;
        });
    </script>
</body>
</html>
